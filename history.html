<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Device History</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>

    :root {

      --primary-color: #346093;
      --secondary-color: #74943c;

      --primary-dark: #2d547f;
      --secondary-dark: #648132;
    }

    body {

      background: var(--primary-color);

      font-family: 'DM Sans', sans-serif;

      min-height: 100vh;
    }

    .navbar {

      background: white;

      min-height: 58px;

      padding-top: 8px !important;
      padding-bottom: 8px !important;
    }

    .navbar-brand img {

      object-fit: contain;
    }

    .page-container {

      padding: 14px;
    }

    .chart-container {

      width: 100%;

      height: 320px;
    }

    .card {

      border: none;

      border-radius: 28px;

      box-shadow:
        0 4px 20px rgba(0,0,0,0.08);
    }

    .date-picker-wrap {

      cursor: pointer;

      min-width: 220px;

      border-radius: 14px;
    }

    .date-picker-wrap input {

      outline: none;

      cursor: pointer;
    }

    .btn-primary {

      background: var(--secondary-color);

      border-color: var(--secondary-color);

      font-weight: 600;
    }

    .btn-primary:hover,
    .btn-primary:focus {

      background: var(--secondary-dark);

      border-color: var(--secondary-dark);
    }

    .btn-outline-secondary {

      color: var(--secondary-color);

      border-color: var(--secondary-color);

      font-weight: 600;

      background: white;
    }

    .btn-outline-secondary:hover,
    .btn-outline-secondary:focus {

      background: var(--secondary-color);

      border-color: var(--secondary-color);

      color: white;
    }

    .chart-title {

      color: var(--primary-color);

      font-weight: 700;
    }

    #title {

      color: white;

      word-break: break-all;
    }

    @media (max-width: 768px) {

      .chart-container {

        height: 240px;
      }

      .date-picker-wrap {

        width: 100%;

        min-width: unset;
      }

      #title {

        font-size: 1.05rem;
      }

      .navbar-brand img {

        height: 30px !important;
      }
    }

  </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar px-3 py-2 shadow-sm">

  <div class="container-fluid px-0">

    <a
      class="navbar-brand d-flex align-items-center m-0"
      href="#"
    >

      <img
        src="logo.svg"
        alt="Firmcompute Logo"
        class="img-fluid"
        style="height:34px;"
      />

    </a>

  </div>

</nav>

<!-- Main Container -->

<div class="container-fluid page-container">

  <!-- Header -->

  <div class="d-flex flex-column gap-3 mb-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">

      <!-- Buttons -->

      <div class="d-flex flex-wrap align-items-center gap-2">

        <button
          class="btn btn-outline-secondary"
          onclick="goBack()"
        >
          ← Back
        </button>

        <button
          class="btn btn-primary"
          onclick="loadHistory()"
        >
          ↻ Refresh
        </button>

        <button
          class="btn btn-outline-secondary"
          onclick="downloadPDF()"
        >
          ⬇ PDF
        </button>
        
        <select
        id="sourceSelect"
        class="form-select"
        style="max-width:140px;"
        onchange="loadHistory()"
        >

        <option value="hot">
          Live DB
        </option>

        <option value="archive">
          Archive DB
        </option>

      </select>

      </div>

      <!-- Date Picker -->

      <div
        class="date-picker-wrap border bg-white px-3 py-2 d-flex align-items-center shadow-sm"
        onclick="openDatePicker()"
      >

        <input
          type="date"
          id="datePicker"
          class="border-0 bg-transparent w-100"
        />

      </div>

    </div>

    <h3
      id="title"
      class="fw-bold mb-0"
    ></h3>

  </div>

  <!-- Messages -->

  <div
    id="loadingMsg"
    class="alert alert-info d-none"
  >
    Loading...
  </div>

  <div
    id="errorMsg"
    class="alert alert-danger d-none"
  ></div>

  <div
    id="emptyMsg"
    class="alert alert-warning d-none"
  >
    No data found for this date.
  </div>

  <!-- Temperature -->

  <div
    class="card p-3 p-md-4 mb-4"
    id="tempCard"
  >

    <h5 class="chart-title mb-4">
      🌡️ Temperature
    </h5>

    <div
      class="chart-container"
      id="tempChart"
    ></div>

  </div>

  <!-- Humidity -->

  <div
    class="card p-3 p-md-4"
    id="humidityCard"
  >

    <h5 class="chart-title mb-4">
      💧 Humidity
    </h5>

    <div
      class="chart-container"
      id="humChart"
    ></div>

  </div>

</div>

<script>

// ─────────────────────────────────────────────
// URL PARAMS
// ─────────────────────────────────────────────

const params =
  new URLSearchParams(window.location.search);

const mac =
  (params.get("mac") || "")
    .trim()
    .toLowerCase();

document.getElementById("title").innerText =
  `History – ${mac}`;

// ─────────────────────────────────────────────

let tempChartInst = null;

let humChartInst  = null;

let currentFilteredData = [];

// ─────────────────────────────────────────────
// TIME HELPERS
// ─────────────────────────────────────────────

function toMs(ts) {

  return ts < 1_000_000_000_000
    ? ts * 1000
    : ts;
}

function toTime(ts) {

  return new Date(toMs(ts))
    .toLocaleTimeString([], {

      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
}

function toDateStr(ts) {

  const d =
    new Date(toMs(ts));

  const year =
    d.getFullYear();

  const month =
    String(d.getMonth() + 1)
    .padStart(2, "0");

  const day =
    String(d.getDate())
    .padStart(2, "0");

  return `${year}-${month}-${day}`;
}

// ─────────────────────────────────────────────
// Y AXIS RANGE
// ─────────────────────────────────────────────

function yAxisRange(values, minSpan) {

  const lo =
    Math.min(...values);

  const hi =
    Math.max(...values);

  const mid =
    (lo + hi) / 2;

  const half =
    Math.max((hi - lo) / 2, minSpan / 2);

  const pad =
    Math.max(half * 0.18, 0.05);

  return {

    min:
      parseFloat((mid - half - pad).toFixed(3)),

    max:
      parseFloat((mid + half + pad).toFixed(3)),
  };
}

// ─────────────────────────────────────────────
// CHART CREATOR
// ─────────────────────────────────────────────

function makeChart(
  divId,
  labels,
  values,
  lineColor,
  fillColor,
  minSpan,
  unit
) {

  const dom =
    document.getElementById(divId);

  const chart =
    echarts.init(dom);

  const { min, max } =
    yAxisRange(values, minSpan);

  chart.setOption({

    animation: false,

    grid: {

      top: 16,

      bottom: 36,

      left: 70,

      right: 20
    },

    tooltip: {

      trigger: 'axis',

      formatter: params => {

        const p = params[0];

        return `
          ${p.axisValue}<br/>
          ${p.marker}
          ${parseFloat(p.value).toFixed(2)}
          ${unit}
        `;
      }
    },

    xAxis: {

      type: 'category',

      data: labels,

      boundaryGap: false,

      axisLine: {
        show: false
      },

      axisTick: {
        show: false
      },

      splitLine: {
        show: false
      },

      axisLabel: {

        fontFamily: 'DM Mono',

        fontSize: 10,

        color: '#9ca3af',

        margin: 10
      }
    },

    yAxis: {

      type: 'value',

      min,

      max,

      axisLine: {
        show: false
      },

      axisTick: {
        show: false
      },

      splitLine: {

        lineStyle: {
          color: '#f3f4f6'
        }
      },

      axisLabel: {

        fontFamily: 'DM Mono',

        fontSize: 10,

        color: '#9ca3af',

        margin: 12,

        formatter:
          v => v.toFixed(2)
      }
    },

    series: [{

      type: 'line',

      data: values,

      smooth: 0.4,

      showSymbol: true,

      symbol: 'circle',

      symbolSize: 5,

      lineStyle: {

        color: lineColor,

        width: 2
      },

      itemStyle: {

        color: lineColor,

        borderColor: '#fff',

        borderWidth: 1
      },

      areaStyle: {

        color: fillColor
      }
    }]
  });

  window.addEventListener(
    'resize',
    () => chart.resize()
  );

  return chart;
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────

function openDatePicker() {

  const input =
    document.getElementById("datePicker");

  if (input.showPicker) {

    input.showPicker();

  } else {

    input.focus();
    input.click();
  }
}

function goBack() {

  window.location.href =
    "index.html";
}

function destroyCharts() {

  if (tempChartInst) {

    tempChartInst.dispose();

    tempChartInst = null;
  }

  if (humChartInst) {

    humChartInst.dispose();

    humChartInst = null;
  }
}

// ─────────────────────────────────────────────
// LOAD HISTORY
// ─────────────────────────────────────────────

async function loadHistory() {

  const selectedDate =
    document.getElementById("datePicker").value;

  document.getElementById("loadingMsg")
    .classList.remove("d-none");

  document.getElementById("errorMsg")
    .classList.add("d-none");

  document.getElementById("emptyMsg")
    .classList.add("d-none");

  let data;

  try {
  
    const source = document.getElementById("sourceSelect").value;

    const res = await fetch(
      `https://fc-ingest-worker.satyaramsl72.workers.dev/device/${mac}?source=${source}&date=${selectedDate}`
    );

    data = await res.json();

  } catch (e) {

    document.getElementById("loadingMsg")
      .classList.add("d-none");

    const el =
      document.getElementById("errorMsg");

    el.textContent =
      `Network error: ${e.message}`;

    el.classList.remove("d-none");

    return;
  }

  document.getElementById("loadingMsg")
    .classList.add("d-none");

  if (!Array.isArray(data) || data.length === 0) {

    document.getElementById("emptyMsg")
      .classList.remove("d-none");

    return;
  }

  if (data.length === 0) {

    document.getElementById("emptyMsg")
      .classList.remove("d-none");

    destroyCharts();

    return;
  }

  currentFilteredData = data;

  renderCharts(data);
}

// ─────────────────────────────────────────────
// RENDER CHARTS
// ─────────────────────────────────────────────

function renderCharts(data) {

  destroyCharts();

  const extRows =
    data.filter(r =>
      r.external_temperature != null &&
      !isNaN(r.external_temperature)
    );

  const intRows =
    data.filter(r =>
      r.internal_temperature != null &&
      !isNaN(r.internal_temperature)
    );

  const humRows =
    data.filter(r =>
      r.humidity != null &&
      !isNaN(r.humidity)
    );

  const useExternal =
    extRows.length > 0;

  const tempRows =
    useExternal ? extRows : intRows;

  const tempField =
    useExternal
      ? "external_temperature"
      : "internal_temperature";

  // TEMP

  if (tempRows.length > 0) {

    document.getElementById("tempCard")
      .style.display = "block";

    const labels =
      tempRows.map(r =>
        toTime(r.received_at)
      );

    const values =
      tempRows.map(r =>
        r[tempField]
      );

    tempChartInst = makeChart(
      'tempChart',
      labels,
      values,
      '#f43f5e',
      'rgba(251,113,133,0.18)',
      0.5,
      '°C'
    );

  } else {

    document.getElementById("tempCard")
      .style.display = "none";
  }

  // HUMIDITY

  if (humRows.length > 0) {

    document.getElementById("humidityCard")
      .style.display = "block";

    const labels =
      humRows.map(r =>
        toTime(r.received_at)
      );

    const values =
      humRows.map(r =>
        r.humidity
      );

    humChartInst = makeChart(
      'humChart',
      labels,
      values,
      '#3b82f6',
      'rgba(96,165,250,0.18)',
      0.5,
      '%'
    );

  } else {

    document.getElementById("humidityCard")
      .style.display = "none";
  }
}

// ─────────────────────────────────────────────
// PDF DOWNLOAD
// ─────────────────────────────────────────────

async function downloadPDF() {

  if (!currentFilteredData.length) {

    alert("No data available.");

    return;
  }

  const { jsPDF } = window.jspdf;

  // compression enabled
  const doc =
    new jsPDF({

      orientation: "p",

      unit: "mm",

      format: "a4",

      compress: true
    });

  const selectedDate =
    document.getElementById("datePicker").value;

  doc.setFont("helvetica", "bold");

  doc.setFontSize(16);

  doc.setTextColor(52, 96, 147);

  doc.text(
    "Firmcompute Device History Report",
    14,
    16
  );

  doc.setFontSize(10);

  doc.setTextColor(80);

  doc.text(`Device: ${mac}`, 14, 24);

  doc.text(`Date: ${selectedDate}`, 14, 30);

  let y = 38;

  // TEMP GRAPH

  if (tempChartInst) {

    const tempCanvas =
      tempChartInst.getRenderedCanvas({

        pixelRatio: 1,

        backgroundColor: '#ffffff'
      });

    const tempImg =
      tempCanvas.toDataURL(
        "image/jpeg",
        0.55
      );

    doc.setFontSize(12);

    doc.setTextColor(52, 96, 147);

    doc.text("Temperature Graph", 14, y);

    y += 4;

    doc.addImage(
      tempImg,
      "JPEG",
      12,
      y,
      180,
      45,
      undefined,
      'FAST'
    );

    y += 54;
  }

  // HUM GRAPH

  if (humChartInst) {

    const humCanvas =
      humChartInst.getRenderedCanvas({

        pixelRatio: 1,

        backgroundColor: '#ffffff'
      });

    const humImg =
      humCanvas.toDataURL(
        "image/jpeg",
        0.55
      );

    doc.setFontSize(12);

    doc.setTextColor(52, 96, 147);

    doc.text("Humidity Graph", 14, y);

    y += 4;

    doc.addImage(
      humImg,
      "JPEG",
      12,
      y,
      180,
      45,
      undefined,
      'FAST'
    );

    y += 58;
  }

  // TABLE

  const useExternal =
    currentFilteredData.some(
      r => r.external_temperature != null
    );

  const headers = ["Timestamp"];

  if (useExternal) {

    headers.push("Temperature (°C)");

  } else {

    headers.push("Internal Temp (°C)");
  }

  if (
    currentFilteredData.some(
      r => r.humidity != null
    )
  ) {

    headers.push("Humidity (%)");
  }

  const rows =
    currentFilteredData.map(r => {

      const arr = [];

      arr.push(
        new Date(toMs(r.received_at))
        .toLocaleString()
      );

      arr.push(
        useExternal
          ? Number(r.external_temperature ?? 0).toFixed(2)
          : Number(r.internal_temperature ?? 0).toFixed(2)
      );

      if (
        headers.includes("Humidity (%)")
      ) {

        arr.push(
          r.humidity != null
            ? Number(r.humidity).toFixed(2)
            : "-"
        );
      }

      return arr;
    });

  if (y > 240) {

    doc.addPage();

    y = 20;
  }

  doc.autoTable({

    startY: y,

    head: [headers],

    body: rows,

    styles: {

      fontSize: 7,

      cellPadding: 1.5,
    },

    headStyles: {

      fillColor: [52, 96, 147],
    },

    alternateRowStyles: {

      fillColor: [245, 247, 250]
    },

    margin: {

      left: 10,
      right: 10
    }
  });

  doc.save(
    `${mac}-${selectedDate}.pdf`
  );
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

const now = new Date();

const localDate = `${now.getFullYear()}-${
  String(now.getMonth() + 1).padStart(2, "0")
}-${
  String(now.getDate()).padStart(2, "0")
}`;

document.getElementById("datePicker").value =
  localDate;

document.getElementById("datePicker")
  .addEventListener("change", loadHistory);

loadHistory();

</script>

</body>
</html>
