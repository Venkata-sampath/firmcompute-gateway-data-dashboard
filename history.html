<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Device History</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- ECharts instead of Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>

    :root {
      --primary-color: #346093;
      --secondary-color: #74943c;
      --primary-dark: #2d547f;
      --secondary-dark: #648132;
    }

    body {
      background: var(--primary-color);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    .navbar {
      background: white;
      min-height: 58px;
      padding-top: 8px !important;
      padding-bottom: 8px !important;
    }

    .navbar-brand img {
      object-fit: contain;
    }

    .page-container {
      padding: 14px;
    }

    /* ECharts container — needs explicit height */
    .chart-container {
      width: 100%;
      height: 320px;
    }

    .card {
      border: none;
      border-radius: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .date-picker-wrap {
      cursor: pointer;
      min-width: 220px;
      border-radius: 14px;
    }

    .date-picker-wrap input {
      outline: none;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--secondary-color);
      border-color: var(--secondary-color);
      font-weight: 600;
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background: var(--secondary-dark);
      border-color: var(--secondary-dark);
    }

    .btn-outline-secondary {
      color: var(--secondary-color);
      border-color: var(--secondary-color);
      font-weight: 600;
      background: white;
    }

    .btn-outline-secondary:hover,
    .btn-outline-secondary:focus {
      background: var(--secondary-color);
      border-color: var(--secondary-color);
      color: white;
    }

    .chart-title {
      color: var(--primary-color);
      font-weight: 700;
    }

    #title {
      color: white;
      word-break: break-all;
    }

    .timestamp {
      font-family: 'DM Mono', monospace;
    }

    @media (max-width: 768px) {
      .chart-container   { height: 240px; }
      .date-picker-wrap  { width: 100%; min-width: unset; }
      #title             { font-size: 1.05rem; }
      .navbar-brand img  { height: 30px !important; }
    }

  </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar px-3 py-2 shadow-sm">
  <div class="container-fluid px-0">
    <a class="navbar-brand d-flex align-items-center m-0" href="#">
      <img src="logo.svg" alt="Firmcompute Logo" class="img-fluid" style="height:34px;" />
    </a>
  </div>
</nav>

<!-- Main Container -->
<div class="container-fluid page-container">

  <!-- Header -->
  <div class="d-flex flex-column gap-3 mb-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">

      <!-- Buttons -->
      <div class="d-flex flex-wrap align-items-center gap-2">
        <button class="btn btn-outline-secondary" onclick="goBack()">← Back</button>
        <button class="btn btn-primary"           onclick="loadHistory()">↻ Refresh</button>
      </div>

      <!-- Date Picker -->
      <div
        class="date-picker-wrap border bg-white px-3 py-2 d-flex align-items-center shadow-sm"
        onclick="openDatePicker()"
      >
        <input type="date" id="datePicker" class="border-0 bg-transparent w-100" />
      </div>

    </div>

    <h3 id="title" class="fw-bold mb-0"></h3>

  </div>

  <!-- Messages -->
  <div id="loadingMsg" class="alert alert-info d-none">Loading...</div>
  <div id="errorMsg"   class="alert alert-danger d-none"></div>
  <div id="emptyMsg"   class="alert alert-warning d-none">No data found for this date.</div>

  <!-- Temperature Card -->
  <div class="card p-3 p-md-4 mb-4" id="tempCard">
    <h5 class="chart-title mb-4">🌡️ Temperature</h5>
    <div class="chart-container" id="tempChart"></div>
  </div>

  <!-- Humidity Card -->
  <div class="card p-3 p-md-4" id="humidityCard">
    <h5 class="chart-title mb-4">💧 Humidity</h5>
    <div class="chart-container" id="humChart"></div>
  </div>

</div>

<script>

// ─────────────────────────────────────────────
// URL PARAMS
// ─────────────────────────────────────────────

const params = new URLSearchParams(window.location.search);
const mac    = params.get("mac") || "";
document.getElementById("title").innerText = `History – ${mac}`;

// ECharts instances
let tempChartInst = null;
let humChartInst  = null;

// ─────────────────────────────────────────────
// TIME HELPERS
// ─────────────────────────────────────────────

function toMs(ts) {
  return ts < 1_000_000_000_000 ? ts * 1000 : ts;
}

function toTime(ts) {
  return new Date(toMs(ts)).toLocaleTimeString([], {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function toDateStr(ts) {
  const d  = new Date(toMs(ts));
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

// ─────────────────────────────────────────────
// Y-AXIS RANGE
// ─────────────────────────────────────────────

function yAxisRange(values, minSpan) {
  const lo   = Math.min(...values);
  const hi   = Math.max(...values);
  const mid  = (lo + hi) / 2;
  const half = Math.max((hi - lo) / 2, minSpan / 2);
  const pad  = Math.max(half * 0.18, 0.05);
  return {
    min: parseFloat((mid - half - pad).toFixed(3)),
    max: parseFloat((mid + half + pad).toFixed(3)),
  };
}

// ─────────────────────────────────────────────
// MAKE ECHARTS CHART
// ─────────────────────────────────────────────

function makeChart(divId, labels, values, lineColor, gradColorStart, gradColorEnd, minSpan, unit) {

  const dom = document.getElementById(divId);
  const chart = echarts.init(dom);

  const { min, max } = yAxisRange(values, minSpan);

  const option = {
    animation: false,
    grid: {
      top: 16,
      bottom: 36,
      left: 56,
      right: 20,
      containLabel: false
    },
    tooltip: {
      trigger: 'axis',
      formatter: params => {
        const p = params[0];
        return `${p.axisValue}<br/>${p.marker} ${parseFloat(p.value).toFixed(2)} ${unit}`;
      },
      backgroundColor: '#fff',
      borderColor: '#e5e7eb',
      textStyle: { color: '#374151', fontFamily: 'DM Mono', fontSize: 12 }
    },
    xAxis: {
      type: 'category',
      data: labels,
      boundaryGap: false,
      axisLine:  { show: false },
      axisTick:  { show: false },
      splitLine: { show: false },
      axisLabel: {
        fontFamily: 'DM Mono',
        fontSize: 10,
        color: '#9ca3af',
        interval: 'auto',
        rotate: 0,
        margin: 10
      }
    },
    yAxis: {
      type: 'value',
      min,
      max,
      splitLine: { lineStyle: { color: '#f3f4f6' } },
      axisLine:  { show: false },
      axisTick:  { show: false },
      axisLabel: {
        fontFamily: 'DM Mono',
        fontSize: 10,
        color: '#9ca3af',
        margin: 12,
        formatter: v => v.toFixed(2)
      }
    },
    series: [{
      type: 'line',
      data: values,
      smooth: 0.4,
      showSymbol: true,
      symbol: 'circle',
      symbolSize: 6,
      itemStyle: {
        color: lineColor,
        borderColor: '#fff',
        borderWidth: 1.5
      },
      lineStyle: {
        color: lineColor,
        width: 2
      },
      areaStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: gradColorStart },
          { offset: 1, color: gradColorEnd }
        ])
      },
      emphasis: {
        scale: true,
        itemStyle: { shadowBlur: 6, shadowColor: lineColor }
      }
    }]
  };

  chart.setOption(option);
  window.addEventListener('resize', () => chart.resize());

  return chart;
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────

function openDatePicker() {
  const input = document.getElementById("datePicker");
  if (input.showPicker) { input.showPicker(); } else { input.focus(); input.click(); }
}

function goBack() {
  window.location.href = "index.html";
}

function destroyCharts() {
  if (tempChartInst) { tempChartInst.dispose(); tempChartInst = null; }
  if (humChartInst)  { humChartInst.dispose();  humChartInst  = null; }
}

// ─────────────────────────────────────────────
// LOAD HISTORY
// ─────────────────────────────────────────────

async function loadHistory() {

  const selectedDate = document.getElementById("datePicker").value;

  document.getElementById("loadingMsg").classList.remove("d-none");
  document.getElementById("errorMsg").classList.add("d-none");
  document.getElementById("emptyMsg").classList.add("d-none");

  let data;
  try {
    const res = await fetch(
      `https://fc-dashboard-worker.satyaramsl72.workers.dev/device/${mac}`
    );
    data = await res.json();
  } catch (e) {
    document.getElementById("loadingMsg").classList.add("d-none");
    const el = document.getElementById("errorMsg");
    el.textContent = `Network error: ${e.message}`;
    el.classList.remove("d-none");
    return;
  }

  document.getElementById("loadingMsg").classList.add("d-none");

  if (!Array.isArray(data) || data.length === 0) {
    document.getElementById("emptyMsg").classList.remove("d-none");
    return;
  }

  // Worker returns newest-first → reverse to oldest-first for charts
  data.reverse();

  if (selectedDate) {
    data = data.filter(row => toDateStr(row.received_at) === selectedDate);
  }

  if (data.length === 0) {
    document.getElementById("emptyMsg").classList.remove("d-none");
    destroyCharts();
    return;
  }

  renderCharts(data);
}

// ─────────────────────────────────────────────
// RENDER CHARTS
// ─────────────────────────────────────────────

function renderCharts(data) {

  destroyCharts();

  const extRows = data.filter(r => r.temperature          != null && !isNaN(r.temperature));
  const intRows = data.filter(r => r.internal_temperature != null && !isNaN(r.internal_temperature));
  const humRows = data.filter(r => r.humidity             != null && !isNaN(r.humidity));

  const useExternal = extRows.length > 0;
  const tempRows    = useExternal ? extRows : intRows;
  const tempField   = useExternal ? "temperature" : "internal_temperature";

  // ── Temperature ──────────────────────────────────

  if (tempRows.length > 0) {
    document.getElementById("tempCard").style.display = "block";

    const labels = tempRows.map(r => toTime(r.received_at));
    const values = tempRows.map(r => r[tempField]);

    tempChartInst = makeChart(
      'tempChart', labels, values,
      '#f43f5e',
      'rgba(251,113,133,0.55)',
      'rgba(254,205,211,0.02)',
      0.5, '°C'
    );
  } else {
    document.getElementById("tempCard").style.display = "none";
  }

  // ── Humidity ─────────────────────────────────────

  if (humRows.length > 0) {
    document.getElementById("humidityCard").style.display = "block";

    const labels = humRows.map(r => toTime(r.received_at));
    const values = humRows.map(r => r.humidity);

    humChartInst = makeChart(
      'humChart', labels, values,
      '#3b82f6',
      'rgba(96,165,250,0.50)',
      'rgba(219,234,254,0.02)',
      0.5, '%'
    );
  } else {
    document.getElementById("humidityCard").style.display = "none";
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

document.getElementById("datePicker").value =
  new Date().toISOString().split("T")[0];

document.getElementById("datePicker")
  .addEventListener("change", loadHistory);

loadHistory();

</script>

</body>
</html>
